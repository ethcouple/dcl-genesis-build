<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏗️</text></svg>" />
  <title>DCL Genesis Build — Catalog Prototype</title>
  <style>
    :root {
      --bg: #0f0a18;
      --surface: #1a1226;
      --border: rgba(255,255,255,0.08);
      --text: #e8e0f0;
      --muted: #8a7d96;
      --accent: #e87995;
      --accent-glow: rgba(232,121,149,0.25);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      padding: 40px 32px 24px;
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    header h1 span { color: var(--accent); }
    header p { color: var(--muted); font-size: 14px; }
    .controls {
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    #crawl-btn {
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    #crawl-btn:hover { opacity: 0.85; }
    #crawl-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #status { color: var(--muted); font-size: 14px; }
    #count {
      margin-left: auto;
      font-size: 13px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      padding: 16px 32px 48px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }
    .card-thumb {
      aspect-ratio: 16/9;
      background: rgba(255,255,255,0.03);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .no-thumb {
      color: var(--muted);
      font-size: 13px;
    }
    .card-body {
      padding: 14px 16px;
    }
    .card-body h3 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .parcel {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
      color: var(--accent);
      margin-bottom: 2px;
    }
    .meta {
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <header>
    <h1>DCL Genesis <span>Build</span></h1>
    <p>Building Catalog — Decentraland Content Server Index (Prototype)</p>
  </header>
  <div class="controls">
    <button id="crawl-btn">Crawl Parcels (-10 to 10)</button>
    <span id="status">Ready</span>
    <span id="count"></span>
  </div>
  <div id="grid"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
